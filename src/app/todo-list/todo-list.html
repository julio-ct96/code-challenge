<h2 class="mb-4">{{ heading() }}</h2>

@if (isLoadingTodos()) {
  <!-- 
    Los atributos aria-live son para que los lectores de pantalla anuncien el cambio de contenido
  -->
  <p data-testid="loading-indicator" aria-live="polite" class="text-center text-gray-500 py-8">Loading todos...</p>
} @else if (todosError()) {
  <p data-testid="error-message" aria-live="polite" class="text-center text-red-500 py-8">{{ todosError() }}</p>
} @else {
  <app-todo-form data-testid="todo-form" (addTodo)="onAddTodo($event)" />
  <app-todo-filter data-testid="todo-filter" [activeFilter]="activeFilter()" (filterChange)="onFilterChange($event)" />

  <!-- 
    aqui pongo explicito role="list" porque sin list-style: none en ul 
    Safari/VoiceOver deja de anunciar el ul como lista si no tiene estilos de lista, esto es necesario 
    porque tailwind elimina el list-style
  -->
  <ul role="list" class="flex-1 min-h-0 overflow-y-auto pr-4">
    <!-- 
    Aqui uso el track con el id + title porque el titulo puede cambiar pero el ID no, por lo tanto, si mantenemos la inmutabilidad
    y no creamos nuevas referencias de los objetos, el track con el id seria insuficiente para identificar un todo si agregaramos la opcion
    de modificar el titulo de un todo, ya que el track se basa en el valor de la propiedad y no en la referencia del objeto
    -->
    @for (todo of filteredTodos(); track todo.id + todo.title) {
      <app-todo-item data-testid="todo-item" [todo]="todo" (toggle)="onToggle($event)" (delete)="onDelete($event)" />
    } @empty {
      <p data-testid="empty-state" aria-live="polite" class="text-center text-gray-500 py-8">No tasks found</p>
    }
  </ul>
}
