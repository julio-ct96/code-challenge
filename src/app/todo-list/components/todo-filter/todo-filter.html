<!-- 
  aqui el track de filteres suficiente porque el array es estatico
-->
@for (filter of filters; track filter) {
  <button
    data-testid="filter-button"
    [attr.aria-pressed]="activeStates()[filter]"
    (click)="onFilterClick(filter)"
    class="rounded px-3 py-1.5 text-sm font-medium hover:cursor-pointer"
    [class.bg-blue-500]="activeStates()[filter]"
    [class.text-white]="activeStates()[filter]"
    [class.bg-gray-200]="!activeStates()[filter]"
  >
    {{ filter | titlecase }}
  </button>
}
